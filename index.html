<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Revizit — Ölç • Yönet • Büyüt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      background: #dde3ef;
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(120,170,255,0.22) 0%, transparent 55%),
        radial-gradient(ellipse at 80% 80%, rgba(60,110,220,0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 10%, rgba(180,210,255,0.18) 0%, transparent 45%);
      font-family: 'Lora', Georgia, serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 40px 24px 80px;
      text-align: center;
    }

    .logo-wrap {
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.45);
      border-radius: 24px;
      padding: 40px 44px;
      max-width: 400px;
      width: 100%;
      box-shadow:
        0 2px 0 rgba(255,255,255,0.5) inset,
        0 16px 48px rgba(40,80,180,0.12);
    }

    .logo-wrap img {
      width: 100%;
      max-width: 280px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .btn-contact {
      position: fixed;
      bottom: 32px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.22);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.5);
      color: #1a3a7a;
      font-family: 'Lora', serif;
      font-size: 13px;
      letter-spacing: 0.05em;
      padding: 12px 28px;
      border-radius: 100px;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(40,80,180,0.12), 0 1px 0 rgba(255,255,255,0.6) inset;
      transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .btn-contact:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.34);
      box-shadow: 0 8px 24px rgba(40,80,180,0.18), 0 1px 0 rgba(255,255,255,0.6) inset;
    }
  </style>
</head>
<body>

  <div class="logo-wrap">
    <img src="logo.png" alt="Revizit — Ölç • Yönet • Büyüt">
  </div>

  <a href="mailto:contact@revizit.com.tr" class="btn-contact">
    ✉&nbsp; Bize ulaşın
  </a>

</body>
</html>
